<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" fill="none" role="img" aria-label="Marc — Founder & Builder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#262626" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <style>
      .wordmark { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-weight: 800; letter-spacing: 2px; }
      .mono { font-family: "SF Mono", "JetBrains Mono", "Courier New", monospace; }
      .label { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-weight: 600; }
      .cursor { animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .scan { animation: scan 6s ease-in-out infinite; }
      @keyframes scan { 0%,100% { transform: translateX(-120px); opacity: 0; } 45%,55% { opacity: 1; } 50% { transform: translateX(120px); } }
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="340" rx="0" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#grid)"/>
  <rect width="1200" height="340" fill="url(#glow)"/>

  <!-- top meta line -->
  <text x="70" y="62" class="mono" font-size="14" fill="#8a8a8a" letter-spacing="4">// FOUNDER · BUILDER · CHINA · 15</text>

  <!-- wordmark -->
  <text x="68" y="178" class="wordmark" font-size="120" fill="#ffffff">MARC</text>
  <rect class="cursor" x="372" y="92" width="14" height="92" fill="#ffffff"/>

  <!-- accent rule with moving sheen -->
  <rect x="72" y="210" width="430" height="2" fill="#2e2e2e"/>
  <rect class="scan" x="72" y="210" width="120" height="2" fill="url(#sheen)"/>

  <!-- tagline -->
  <text x="72" y="248" class="label" font-size="19" fill="#d4d4d4">Personality isn't a prompt skin. It's a reasoning parameter.</text>

  <!-- product tags -->
  <text x="72" y="292" class="mono" font-size="14" fill="#6e6e6e" letter-spacing="2">
    <tspan fill="#bdbdbd">PAWLY</tspan>  ·  <tspan fill="#bdbdbd">RESONIX</tspan>  ·  <tspan fill="#bdbdbd">HORIZON-AI</tspan>  ·  <tspan fill="#bdbdbd">DISCORVER</tspan>
  </text>

  <!-- right-side status block -->
  <g transform="translate(940,118)">
    <circle cx="0" cy="-5" r="5" fill="#ffffff"><animate attributeName="opacity" values="1;0.25;1" dur="2.2s" repeatCount="indefinite"/></circle>
    <text x="18" y="0" class="mono" font-size="14" fill="#9a9a9a">STATUS</text>
    <text x="18" y="26" class="mono" font-size="17" fill="#ffffff">building · in public</text>
    <text x="18" y="54" class="mono" font-size="13" fill="#6e6e6e">marcyy.me</text>
  </g>
</svg>
